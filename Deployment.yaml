apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing-api-blue
  namespace: production
spec:
  replicas: 3
  selector:
    matchLabels:
      app: billing-api
      version: blue
  template:
    metadata:
      labels:
        app: billing-api
        version: blue
    spec:
      containers:
      - name: billing-api
        image: tejasrivaspari/billing-api:v1.0
        ports:
        - containerPort: 3000
        env:
        - name: DB_HOST
          value: "telecom-db.us-west-2.rds.amazonaws.com"
---
apiVersion: v1
kind: Service
metadata:
  name: billing-api
spec:
  selector:
    app: billing-api
  ports:
  - port: 80
    targetPort: 3000

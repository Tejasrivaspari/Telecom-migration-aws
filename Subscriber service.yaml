apiVersion: apps/v1
kind: Deployment
metadata:
  name: subscriber-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: subscriber-service
  template:
    metadata:
      labels:
        app: subscriber-service
    spec:
      containers:
      - name: subscriber-service
        image: python:3.9
        command: ["python", "-c", "print('Subscriber service running')"]
